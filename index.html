<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wii-9 Scoresheet</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #181717;
      color: rgb(0, 0, 0);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .wii {
      color: orange;
    }

    .dashnine {
      color: rgb(255, 255, 255);
      padding: 2px 0px;
      border-radius: 6px;
    }

    .scoresheet {
      color: rgb(255, 255, 255);
    }

    p {
      color: #ffffff;
      margin-bottom: 30px;
    }

    .buttons button {
      padding: 12px 25px;
      margin: 10px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .play {
      background: #22c55e;
      color: white;
    }

    .rules {
      background: #38bdf8;
      color: white;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>
      <span class="wii">Wii</span><span class="dashnine">-9</span>
      <span class="scoresheet">Scoresheet</span>
    </h1>

    <p>
      A score tracker for 9-ball using Wii Play rules.
    </p>

    <div class="buttons">
      <button class="play" onclick="location.href='game.html'">Play</button>
      <button class="rules">Rules</button>
    </div>
  </div>

</body>
</html>
